<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신청 내역 조회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supply/message.js" defer></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between mb-3">
            <h2>신청 내역 목록</h2>
            <a th:href="@{/orders/insert}" class="btn btn-primary">신규 신청</a>
        </div>
        <div class="card shadow-sm p-3">
            <table class="table table-hover text-center" style="table-layout: fixed;">
                <thead>
                    <tr>
                        <th>신청 번호</th>
                        <th>사번</th>
                        <th>비품 번호</th>
                        <th>신청 수량</th>
                        <th>신청 일시</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(orderList)}">
                        <td colspan="7" class="text-center">신청 내역이 존재하지 않습니다.</td>
                    </tr>
                    <tr th:each="order : ${orderList}">
                        <td>
                            <a th:href="@{/orders/{orderId}(orderId=${order.orderId})}"
                               th:text="${order.orderId}"></a>
                        </td>
                        <td th:text="${order.employeeId}"></td>
                        <td th:text="${order.itemId}"></td>
                        <td th:text="${order.requestQty}"></td>
                        <td th:text="${order.orderDate}"></td>
                        <td th:text="${order.status}"></td>
                        <td>
                            <a th:href="@{/orders/{orderId}/edit(orderId=${order.orderId})}"
                               class="btn btn-sm btn-outline-warning me-2">상태 변경</a>
                            <form th:action="@{/orders/{orderId}/delete(orderId=${order.orderId})}" method="post"
                                  style="display:inline;"
                                  onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
