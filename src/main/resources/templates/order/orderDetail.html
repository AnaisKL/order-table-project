<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신청 상세 조회</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm p-4 col-md-6 mx-auto">
            <h3 class="mb-4">신청 상세 정보</h3>

            <div class="mb-3">
                <label class="form-label">신청 번호</label>
                <input type="text" class="form-control bg-light" th:value="${order.orderId}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">사번</label>
                <input type="text" class="form-control bg-light" th:value="${order.employeeId}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">비품 번호</label>
                <input type="text" class="form-control bg-light" th:value="${order.itemId}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">신청 수량</label>
                <input type="number" class="form-control bg-light" th:value="${order.requestQty}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">신청 일시</label>
                <input type="text" class="form-control bg-light" th:value="${order.orderDate}" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label">상태</label>
                <input type="text" class="form-control bg-light" th:value="${order.status}" readonly>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/orders/list}" class="btn btn-secondary">목록으로</a>
                <a th:href="@{/orders/{orderId}/edit(orderId=${order.orderId})}" class="btn btn-warning">상태 변경</a>
                <form th:action="@{/orders/{orderId}/delete(orderId=${order.orderId})}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <button type="submit" class="btn btn-danger">삭제</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
