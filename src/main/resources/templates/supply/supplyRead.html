<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비품 조회 페이지</title> <!--전체 비품 목록 조회, 특정 비품 상세 조회 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between mb-3">
            <h2>비품 목록</h2>
            <a th:href="@{/supplies/insert}" class="btn btn-primary">신규 등록</a>
        </div>
        <div class="card shadow-sm p-3">
            <table class="table table-hover text-center" style="table-layout: fixed;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>비품명</th>
                        <th>카테고리</th>
                        <th>재고</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(supplyList)}">
                        <td colspan="5" class="text-center">
                            내역이 존재하지 않습니다. 작성해 주세요.
                        </td>
                    </tr>

                    <tr th:each="supply : ${supplyList}" class="text-center">
                        <td th:text="${supply.itemId}"></td>
                        <td>
                            <a th:href="@{/supplies/{itemId}(itemId=${supply.itemId})}"
                               th:text="${supply.itemName}">
                            </a>
                        </td>
                        <td th:text="${supply.category}"></td>
                        <td th:text="${supply.stock}"></td>
                        <td>
                            <a th:href="@{/supplies/{itemId}/edit(itemId=${supply.itemId})}" class="btn btn-sm btn-outline-warning me-2">수량 수정</a>
                            <form th:action="@{/supplies/{itemId}/delete(itemId=${supply.itemId})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    비품 삭제
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
