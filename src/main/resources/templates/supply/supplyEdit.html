<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비품 수정 페이지</title> <!--기존 비품 정보 및 재고 수정 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm p-4 col-md-6 mx-auto">
            <h3 class="mb-4">비품 정보 수정</h3>
            <form id="editForm" action="/supplies/{itemId}" method="post">
                <!-- 수정시에는 PUT 메서드라는 것을 스프링에게 알려주는 팁 -->
                <input type="hidden" name="_method" value="PUT">

                <div class="mb-3">
                    <label class="form-label">비품명</label>
                    <input type="text" name="itemName" class="form-control" value="케이블 타이">
                </div>
                <div class="mb-3">
                    <label class="form-label">카테고리</label>
                    <input type="text" name="category" class="form-control" value="사무용품">
                </div>
                <div class="mb-3">
                    <label class="form-label">수정할 재고</label>
                    <input type="number" name="stock" class="form-control" value="15">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">수정 완료</button>
                    <a href="/supplies" class="btn btn-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
