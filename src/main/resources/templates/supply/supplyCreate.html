<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비품 등록 페이지</title> <!-- 신규 비품 등록 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/supply/insert.js" defer></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow-sm p-4 col-md-6 mx-auto">
            <h3 class="mb-4">신규 비품 등록</h3>
            <form id="insertForm" th:action="@{/supplies/insert}" method="post">
                <div class="mb-3">
                    <label class="form-label">비품 번호</label>
                    <input type="text" name="itemId" class="form-control" placeholder="비품 번호를 입력하세요" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">비품명</label>
                    <input type="text" name="itemName" class="form-control" placeholder="등록할 비품명을 적어주세요" required>
                    <br>
                    <button type="button" id="itemNameCheckBtn" class="btn btn-outline-primary">중복 확인</button>
                </div>
                <small id="itemNameMessage" class="form-text"></small>
                <div class="mb-3">
                    <label class="form-label">카테고리</label>
                    <select name="category" class="form-select" required>
                        <option value="">카테고리 선택</option>
                        <option value="사무용품">사무용품</option>
                        <option value="청소용품">청소용품</option>
                        <option value="공구">공구</option>
                        <option value="소모품">소모품</option>
                        <option value="간식">간식</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">현재 재고</label>
                    <input type="number" name="stock" class="form-control" value="0" required readonly>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">등록하기</button>
                    <a th:href="@{/supplies/list}" class="btn btn-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
