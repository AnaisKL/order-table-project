<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>직원 정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
    <div class="container" style="max-width: 500px; margin: 50px auto;">
        <h2>📝 직원 정보 수정</h2>

        <form th:action="@{/employees/edit}" th:object="${employee}" method="post">

            <input type="hidden" th:field="*{employeeId}" />

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">사번</label>
                <input type="text" th:value="${employee.employeeId}" readonly
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background-color: #f4f4f4; cursor: not-allowed;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="name" style="display: block; margin-bottom: 5px; font-weight: bold;">이름</label>
                <input type="text" id="name" th:field="*{name}" required
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="department" style="display: block; margin-bottom: 5px; font-weight: bold;">부서</label>
                <input type="text" id="department" th:field="*{department}"
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label for="contact" style="display: block; margin-bottom: 5px; font-weight: bold;">연락처</label>
                <input type="text" id="contact" th:field="*{contact}"
                       style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>

            <div class="btn-group" style="display: flex; gap: 10px; align-items: center;">
                <button type="submit" class="btn btn-primary" style="padding: 10px 20px; font-size: 16px;">수정</button>
                <a th:href="@{/employees/list}" class="btn btn-secondary" style="text-decoration: none; color: #555; margin-left: 10px;">목록</a>
            </div>
        </form>
    </div>
</body>
</html>
