<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>편의점 직원 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">
            편의점 직원 관리 시스템
        </h2>
        <!-- 등록 버튼 -->
        <div class="mb-3 text-end">
            <a th:href="@{/employees/write}" class="btn btn-primary">
                직원 등록
            </a>
            <a th:href="@{/employees/departments}" class="btn btn-primary" style="background-color: #28a745; border-color: #28a745; margin-left: 10px;">
                🏢 부서별로 보기
            </a>
        </div>
        <div th:if="${param.error != null and param.error[0] == 'duplicate'}"
             style="color: #e74c3c; background-color: #fde8e7; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-weight: bold;">
            ⚠️ 이미 등록되어 있는 사원 번호입니다. 다른 사원 번호로 등록해 주세요.
        </div>
        <!-- 직원 목록 -->
        <table class="table table-bordered table-hover table-striped">
            <thead class="table-dark">
                <tr>
                    <th>사번</th>
                    <th>이름</th>
                    <th>부서</th>
                    <th>연락처</th>
                    <th width="180">관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="employee : ${employeeList}">
                    <td th:text="${employee.employeeId}"></td>
                    <td th:text="${employee.name}"></td>
                    <td th:text="${employee.department}"></td>
                    <td th:text="${employee.contact}"></td>
                    <td>
                        <a th:href="@{/employees/edit/{id}(id=${employee.employeeId})}" class="btn btn-warning btn-sm">
                            수정
                        </a>
                        <a th:href="@{/employees/delete/{id}(id=${employee.employeeId})}"
                           class="btn btn-danger btn-sm" onclick="return confirm('삭제하시겠습니까?')">
                            삭제
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(employeeList)}">
                    <td colspan="5" style="text-align: center; color: #888;">등록된 직원 정보가 없습니다.</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
