<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>직원 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" th:href="@{/css/common.css}">
    <script th:src="@{/js/employee.js}"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">직원 등록</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/employees/write}" th:object="${employee}" method="post" onsubmit="return checkForm()">
                            <!-- 사번 -->
                            <div class="mb-3">
                                <label class="employeeId">사번</label>
                                <input type="text" id="employeeId" class="form-control" th:field="*{employeeId}" placeholder="사번 입력">
                            </div>
                            <!-- 이름 -->
                            <div class="mb-3">
                                <label class="name">이름</label>
                                <input type="text" id="name" class="form-control" th:field="*{name}" placeholder="이름 입력">
                            </div>
                            <!-- 부서 -->
                            <div class="mb-3">
                                <label class="department">부서</label>
                                <input type="text" id="department" class="form-control" th:field="*{department}" placeholder="부서 입력">
                            </div>
                            <!-- 연락처 -->
                            <div class="mb-3">
                                <label class="contact">연락처</label>
                                <input type="text" id="contact" class="form-control" th:field="*{contact}" placeholder="010-0000-0000">
                            </div>
                            <div class="btn-group">
                                <button type="submit" class="btn btn-primary">
                                    등록하기
                                </button>
                                <a th:href="@{/employees/list}" class="btn btn-secondary">
                                    목록으로 돌아가기
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
